<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="page-container">
  <h2>File d'attente des passations</h2>

  <div *ngIf="loading">
    <p-skeleton *ngFor="let i of [1,2,3,4,5]"
                [style]="{ 'height': '2.5rem', 'margin-bottom': '1rem' }"></p-skeleton>
  </div>

  <div *ngIf="!loading && handovers.length === 0">
    <p-message severity="info" text="Aucune passation en attente."></p-message>
  </div>

  <p-table
    *ngIf="!loading && handovers.length > 0"
    [value]="handovers"
    [tableStyle]="{ 'min-width': '60rem' }">
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="ticketCode">Ticket <p-sortIcon field="ticketCode"></p-sortIcon></th>
        <th pSortableColumn="validationId">Zone <p-sortIcon field="validationId"></p-sortIcon></th>
        <th>Technicien sortant</th>
        <th pSortableColumn="scheduledAt">Créé le <p-sortIcon field="scheduledAt"></p-sortIcon></th>
        <th>Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-rowData>
      <tr>
        <td>{{ rowData.ticketCode }}</td>
        <td>{{ rowData.validationId }}</td>
        <td>{{ rowData.fromTechUsername }}</td>
        <td>{{ rowData.scheduledAt | date:'dd/MM/yyyy HH:mm' }}</td>
        <td>
          <p-dropdown
            [options]="techVals"
            [(ngModel)]="selectedTechId[rowData.id]"
            optionLabel="username"
            optionValue="id"
            placeholder="Choisir un tech"
            [style]="{ 'width': '200px' }"
            class="mr-2">
          </p-dropdown>
          <p-button
            label="Assigner"
            icon="pi pi-user-plus"
            (click)="assign(rowData.id)"
            [disabled]="!selectedTechId[rowData.id]"
            size="small"
            class="mr-2">
          </p-button>
          <p-button
            label="Annuler"
            icon="pi pi-times"
            [severity]="'danger'"
            (click)="confirmCancel(rowData.id)"
            size="small">
          </p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
