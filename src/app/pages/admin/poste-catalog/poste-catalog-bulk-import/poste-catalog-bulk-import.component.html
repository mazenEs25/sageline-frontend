<p-dialog
  [(visible)]="visible"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [style]="{ width: '800px' }"
  header="Import groupé"
>
  <div class="bulk-import-content" *ngIf="!report">
    <!-- Poste Type Selection -->
    <div class="form-group">
      <label for="targetPosteType">Type de poste *</label>
      <p-dropdown
        id="targetPosteType"
        name="targetPosteType"
        [(ngModel)]="targetPosteType"
        [options]="posteTypeOptions"
        optionLabel="label"
        optionValue="value"
      ></p-dropdown>
    </div>

    <!-- JSON Input -->
    <div class="form-group">
      <label for="jsonInput">Données JSON *</label>
      <textarea
        pInputTextarea
        id="jsonInput"
        name="jsonInput"
        [(ngModel)]="jsonInput"
        rows="14"
        [style]="{ 'font-family': 'var(--font-mono, monospace)' }"
        placeholder="[
  { &quot;measureCode&quot;: &quot;CODE1&quot;, &quot;measureLabel&quot;: &quot;Label 1&quot;, ... },
  { &quot;measureCode&quot;: &quot;CODE2&quot;, &quot;measureLabel&quot;: &quot;Label 2&quot;, ... }
]"
      ></textarea>
    </div>

    <!-- Submit Button -->
    <div class="form-actions">
      <p-button
        label="Valider"
        icon="pi pi-check"
        [disabled]="!targetPosteType || !jsonInput || submitting"
        [loading]="submitting"
        (onClick)="onSubmit()"
      ></p-button>
    </div>
  </div>

  <!-- Results Report -->
  <div class="bulk-import-report" *ngIf="report">
    <div class="report-summary">
      <p-tag
        severity="success"
        [value]="'✓ ' + report.created.length + ' créés'"
      ></p-tag>
      <p-tag
        *ngIf="report.failed.length > 0"
        severity="danger"
        [value]="'✗ ' + report.failed.length + ' échoués'"
      ></p-tag>
    </div>

    <div class="report-failed" *ngIf="report.failed.length > 0">
      <h4>Erreurs:</h4>
      <ul>
        <li *ngFor="let item of report.failed">
          <strong>Index {{ item.index }} (Code: {{ item.code || 'N/A' }})</strong>: {{ item.reason }}
        </li>
      </ul>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <p-button
      *ngIf="report"
      label="Recommencer"
      icon="pi pi-refresh"
      severity="secondary"
      (onClick)="resetForm()"
    ></p-button>
    <p-button
      label="Fermer"
      icon="pi pi-times"
      (onClick)="onClose()"
      severity="secondary"
    ></p-button>
  </ng-template>
</p-dialog>
