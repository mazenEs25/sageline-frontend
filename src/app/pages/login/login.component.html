<div class="login-page">
  <!-- Background effects -->
  <div class="bg-grid"></div>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <!-- Login content -->
  <div class="login-wrapper">

    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon">
        <i class="pi pi-sitemap"></i>
      </div>
      <h1 class="logo-title">SageLine</h1>
      <p class="logo-subtitle">Plateforme de validation industrielle</p>
    </div>

    <!-- Form Card -->
    <div class="login-card" [class.shake]="shake">
      <h2 class="card-title">Connexion</h2>
      <p class="card-subtitle">Entrez vos identifiants pour accéder au système</p>

      <!-- Error Message -->
      <div class="error-box" *ngIf="error">
        <i class="pi pi-times-circle"></i>
        <span>{{ error }}</span>
      </div>

      <form (ngSubmit)="onLogin()">
        <!-- Username -->
        <div class="form-field">
          <label for="username">Nom d'utilisateur</label>
          <div class="input-wrapper">
            <i class="pi pi-user input-icon"></i>
            <input
              id="username"
              type="text"
              [(ngModel)]="username"
              name="username"
              placeholder="ex: admin01"
              [disabled]="loading"
              autocomplete="username" />
          </div>
        </div>

        <!-- Password -->
        <div class="form-field">
          <label for="password">Mot de passe</label>
          <div class="input-wrapper">
            <i class="pi pi-lock input-icon"></i>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              placeholder="Votre mot de passe"
              [disabled]="loading"
              autocomplete="current-password" />
            <button type="button" class="toggle-password"
              (click)="showPassword = !showPassword">
              <i [class]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="login-btn" [disabled]="loading">
          <span class="spinner" *ngIf="loading"></span>
          <i class="pi pi-sign-in" *ngIf="!loading"></i>
          {{ loading ? 'Connexion en cours...' : 'Se connecter' }}
        </button>
      </form>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <div class="footer-secure">
        <i class="pi pi-shield"></i>
        <span>Connexion sécurisée via Keycloak</span>
      </div>
      <div class="footer-version">SageLine v1.0 — Esprit PFE 2025</div>
    </div>
  </div>
</div>
