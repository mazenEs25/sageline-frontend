<p-toast></p-toast>

<div *ngIf="ticket.status === 'EN_ATTENTE_HANDOVER'">
  <p-message severity="warn">
    <div>
      <div *ngIf="authService.getRoles().includes('TECH_VAL')">
        Ce ticket est en attente de passation.
        <p-button label="Accepter" icon="pi pi-check" (click)="accept()" size="small" class="ml-3"></p-button>
      </div>

      <div *ngIf="authService.getRoles().includes('CHEF_SECTEUR') || authService.getRoles().includes('ADMIN_IT')">
        Passation en attente — assigner un technicien
        <p-dropdown
          [options]="techVals"
          [(ngModel)]="selectedTechId"
          optionLabel="username"
          optionValue="id"
          placeholder="Choisir un technicien"
          [style]="{ 'width': '220px' }"
          class="ml-3">
        </p-dropdown>
        <p-button
          label="Assigner"
          icon="pi pi-user-plus"
          (click)="assign()"
          [disabled]="!selectedTechId || assigning"
          [loading]="assigning"
          size="small"
          class="ml-2">
        </p-button>
      </div>
    </div>
  </p-message>
</div>
