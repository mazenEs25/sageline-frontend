<!-- secteur-list.component.html -->
<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="secteurs-page">

  <!-- ═══ Header ═══ -->
  <div class="sage-page-header">
    <div class="title-block">
      <span class="eyebrow">Organisation</span>
      <h1><i class="pi pi-building"></i> Secteurs</h1>
      <p>Gérez les secteurs de production, leurs phases et lignes associées</p>
    </div>

    <div class="header-actions">
      <button pButton
              icon="pi pi-plus"
              label="Nouveau Secteur"
              class="p-button-primary p-button-sm"
              (click)="openNew()"></button>
    </div>
  </div>

  <!-- ═══ Filters bar ═══ -->
  <div class="sage-filters-bar">
    <div class="sage-search-box">
      <i class="pi pi-search"></i>
      <input pInputText
             type="text"
             placeholder="Rechercher un secteur (code ou nom)..."
             (input)="dt.filterGlobal($any($event.target).value, 'contains')" />
    </div>

    <div class="filter-group">
      <p-dropdown [options]="statusOptions"
                  [(ngModel)]="statusFilter"
                  placeholder="Tous les statuts"
                  [showClear]="true"
                  (onChange)="dt.filter(statusFilter, 'active', 'equals')"
                  styleClass="modern-dd"></p-dropdown>
    </div>
  </div>

  <!-- ═══ Table ═══ -->
  <div class="sage-table-card">
    <p-table #dt
             [value]="secteurs"
             [loading]="loading"
             [paginator]="true"
             [rows]="10"
             styleClass="p-datatable-sm"
             responsiveLayout="scroll"
             [globalFilterFields]="['code', 'name', 'description']">

      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="code">Code <p-sortIcon field="code"></p-sortIcon></th>
          <th pSortableColumn="name">Nom <p-sortIcon field="name"></p-sortIcon></th>
          <th>Description</th>
          <th>Phases</th>
          <th>Lignes</th>
          <th>Statut</th>
          <th style="width: 110px;">Actions</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-secteur>
        <tr>
          <td><span class="secteur-code">{{ secteur.code }}</span></td>
          <td><strong>{{ secteur.name }}</strong></td>
          <td class="muted-cell">{{ secteur.description || '—' }}</td>
          <td><p-badge [value]="secteur.phaseCount" severity="info"></p-badge></td>
          <td><p-badge [value]="secteur.lineCount" severity="success"></p-badge></td>
          <td>
            <p-tag [value]="secteur.active ? 'Actif' : 'Inactif'" [severity]="secteur.active ? 'success' : 'danger'"></p-tag>
          </td>
          <td>
            <button pButton icon="pi pi-pencil" class="p-button-text p-button-sm" (click)="editSecteur(secteur)" pTooltip="Modifier"></button>
            <button pButton icon="pi pi-trash" class="p-button-text p-button-danger p-button-sm" (click)="deleteSecteur(secteur)" pTooltip="Supprimer"></button>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="7" class="empty-state">
            <i class="pi pi-inbox"></i>
            <p>Aucun secteur trouvé</p>
            <small>Ajustez votre recherche ou créez un nouveau secteur</small>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<!-- Dialog -->
<p-dialog [header]="isEdit ? 'Modifier le Secteur' : 'Nouveau Secteur'" [(visible)]="displayDialog"
          [modal]="true" [style]="{width: '460px'}" [closable]="true" [draggable]="false">
  <div class="flex flex-column gap-3 pt-3">
    <div class="field">
      <label for="code">Code *</label>
      <input pInputText id="code" [(ngModel)]="form.code" class="w-full" [style.text-transform]="'uppercase'" maxlength="10" />
    </div>
    <div class="field">
      <label for="name">Nom *</label>
      <input pInputText id="name" [(ngModel)]="form.name" class="w-full" />
    </div>
    <div class="field">
      <label for="desc">Description</label>
      <textarea pInputTextarea id="desc" [(ngModel)]="form.description" class="w-full" rows="3"></textarea>
    </div>
    <div class="field">
      <label>Statut</label>
      <div class="flex gap-3">
        <p-radioButton name="active" [value]="true" [(ngModel)]="form.active" label="Actif"></p-radioButton>
        <p-radioButton name="active" [value]="false" [(ngModel)]="form.active" label="Inactif"></p-radioButton>
      </div>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <button pButton label="Annuler" icon="pi pi-times" class="p-button-text" (click)="displayDialog = false"></button>
    <button pButton label="Enregistrer" icon="pi pi-check" class="p-button-primary" (click)="save()" [disabled]="!form.code || !form.name"></button>
  </ng-template>
</p-dialog>
