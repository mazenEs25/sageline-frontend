<div class="sidebar">
  <!-- Logo -->
  <div class="sidebar-logo">
    <div class="logo-icon"><i class="pi pi-sitemap"></i></div>
    <div class="logo-text">
      <span class="logo-name">SageLine</span>
      <span class="logo-sub">Administration</span>
    </div>
  </div>

  <!-- Menu (filtered by role) -->
  <div class="sidebar-menu">
    <div *ngFor="let group of filteredMenuItems" class="menu-group">
      <div class="menu-label">{{ group.label }}</div>
      <a *ngFor="let item of group.items"
         [routerLink]="item.route"
         class="menu-item"
         [class.active]="isActive(item.route)">
        <div class="active-indicator" *ngIf="isActive(item.route)"></div>
        <i [class]="item.icon"></i>
        <span>{{ item.label }}</span>
      </a>
    </div>
  </div>
</div>
